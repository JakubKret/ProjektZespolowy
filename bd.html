<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; }
</style>
<h2 style="position:absolute;left:-9999px">HDK App — poprawiony schemat bazy danych SQLite, 9 tabel, optymalizacja odznak</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryBorderColor: dark ? '#AFA9EC' : '#7F77DD',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryBorderColor: dark ? '#5DCAA5' : '#1D9E75',
    tertiaryColor: dark ? '#444441' : '#F1EFE8',
    tertiaryBorderColor: dark ? '#B4B2A9' : '#888780',
    edgeLabelBackground: dark ? '#2C2C2A' : '#ffffff',
    attributeBackgroundColorEven: dark ? '#26215C' : '#EEEDFE',
    attributeBackgroundColorOdd: dark ? '#2C2C2A' : '#F1EFE8',
  },
  er: { diagramPadding: 20, layoutDirection: 'TB', minEntityWidth: 100, minEntityHeight: 75, entityPadding: 15, useMaxWidth: true }
});

const diagram = `erDiagram
    DONOR_PROFILE {
        integer id PK
        text first_name
        text last_name
        date birth_date
        text sex
        text blood_type
        text rh_factor
        datetime created_at
    }
    DONATIONS {
        integer id PK
        integer donor_profile_id FK
        integer blood_center_id FK
        text donation_type
        date donation_date
        integer volume_ml
        integer is_rejected
        text rejection_reason
        text notes
        datetime created_at
    }
    MENSTRUAL_CYCLES {
        integer id PK
        integer donor_profile_id FK
        date start_date
        date end_date
        integer is_active
    }
    MORPHOLOGY_RESULTS {
        integer id PK
        integer donor_id FK
        integer donation_id FK
        text result_date
        text image_path
        real ocr_confidence
        integer is_verified
        real hgb_g_dl
        real hct_pct
        real rbc_mln_ul
        real mcv_fl
        real mch_pg
        real mchc_g_dl
        real rdw_pct
        real wbc_tys_ul
        real neut_pct
        real lymph_pct
        real mono_pct
        real eos_pct
        real baso_pct
        real plt_tys_ul
        real mpv_fl
        real fe_ug_dl
        real ferritin_ng_ml
        text lab_name
        datetime created_at
    }
    BLOOD_CENTERS {
        integer id PK
        text name
        text city
        text address
        real latitude
        real longitude
        integer is_mobile
        text phone
        text operating_hours_json
        datetime last_updated
    }
    ZHDK_BADGE_DEFINITIONS {
        integer id PK
        text badge_code
        text name
        real threshold_liters_male
        real threshold_liters_female
        text issuing_body
        text privileges_json
    }
    DONOR_BADGES_EARNED {
        integer id PK
        integer donor_profile_id FK
        integer badge_id FK
        date earned_date
        real total_liters_at_earn
    }
    NOTIFICATION_LOG {
        integer id PK
        integer donor_profile_id FK
        text notification_type
        datetime scheduled_at
        datetime sent_at
        integer is_dismissed
        text payload_json
    }
    PIT_ANNUAL_SUMMARY {
        integer id PK
        integer donor_profile_id FK
        integer tax_year
        integer total_volume_ml
        real total_liters
        real rate_pln_per_liter
        real gross_deduction_pln
        real income_6pct_cap
        real net_deduction_pln
        datetime last_calculated_at
    }

    DONOR_PROFILE ||--o{ DONATIONS : "makes"
    DONOR_PROFILE ||--o{ MENSTRUAL_CYCLES : "tracks"
    DONOR_PROFILE ||--o{ MORPHOLOGY_RESULTS : "has"
    DONOR_PROFILE ||--o{ DONOR_BADGES_EARNED : "earns"
    DONOR_PROFILE ||--o{ NOTIFICATION_LOG : "receives"
    DONOR_PROFILE ||--o{ PIT_ANNUAL_SUMMARY : "calculates"
    BLOOD_CENTERS ||--o{ DONATIONS : "hosts"
    DONATIONS ||--o{ MORPHOLOGY_RESULTS : "linked to"
    ZHDK_BADGE_DEFINITIONS ||--o{ DONOR_BADGES_EARNED : "defines"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
